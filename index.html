<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KryxMind AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0c29;
            color: #fff;
            min-height: 100vh;
            padding: 12px;
        }
        .container { max-width: 420px; margin: 0 auto; }

        .header { text-align: center; padding: 10px 0; }
        .header h1 {
            font-size: 22px; font-weight: 900;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4dabf7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .model-selector {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin: 8px 0 12px;
        }
        .model-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: #fff;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1 0 auto;
        }
        .model-btn:active { transform: scale(0.95); }
        .model-btn.active {
            border-color: #6bcb77;
            background: rgba(107, 203, 119, 0.15);
        }
        .model-btn.premium {
            border-color: rgba(255, 217, 61, 0.3);
        }

        .chat-container {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            padding: 10px;
            height: 60vh;
            display: flex;
            flex-direction: column;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 4px 6px;
            margin-bottom: 8px;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .msg {
            padding: 8px 14px;
            margin: 4px 0;
            border-radius: 14px;
            max-width: 88%;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }
        .msg.user {
            background: rgba(255, 107, 107, 0.2);
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .msg.bot {
            background: rgba(77, 171, 247, 0.12);
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }
        .msg .time { font-size: 10px; opacity: 0.3; display: block; margin-top: 4px; }

        .input-area {
            display: flex;
            gap: 8px;
        }
        .input-area input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.04);
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .input-area input::placeholder { color: rgba(255,255,255,0.25); }
        .input-area button {
            padding: 10px 18px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #ff6b6b, #ff8a5c);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }
        .input-area button:active { transform: scale(0.95); }

        .actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .actions button {
            flex: 1;
            padding: 10px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .actions button:active { background: rgba(255,255,255,0.08); }
        .actions button.danger { color: #ff6b6b; border-color: rgba(255,107,107,0.2); }
        .actions button.warning { color: #ffd93d; border-color: rgba(255,217,61,0.2); }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .toast {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            color: #fff;
            font-size: 13px;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 100;
            max-width: 90%;
            text-align: center;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(8px);
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1a1a3e;
            padding: 24px;
            border-radius: 20px;
            max-width: 320px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .modal-content h3 { margin-bottom: 12px; color: #ff6b6b; }
        .modal-content p { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 16px; }
        .modal-buttons { display: flex; gap: 10px; }
        .modal-buttons button {
            flex: 1; padding: 12px; border-radius: 12px; border: none;
            font-weight: 700; cursor: pointer; font-size: 14px;
        }
        .modal-buttons .confirm { background: #ff6b6b; color: #fff; }
        .modal-buttons .cancel { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6); }
        .modal-buttons button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="container">
        <div class="toast" id="toast"></div>

        <!-- Модальное окно для /clearall -->
        <div class="modal" id="clearallModal">
            <div class="modal-content">
                <h3>⚠️ ВНИМАНИЕ!</h3>
                <p>Ты собираешься удалить ВСЮ историю переписки у ВСЕХ пользователей.<br><br>Это действие НЕОБРАТИМО!</p>
                <div class="modal-buttons">
                    <button class="confirm" onclick="confirmClearAll()">✅ УДАЛИТЬ ВСЁ</button>
                    <button class="cancel" onclick="closeModal()">❌ ОТМЕНА</button>
                </div>
            </div>
        </div>

        <div class="header">
            <h1>🍓 KryxMind AI</h1>
        </div>

        <!-- МОДЕЛИ -->
        <div class="model-selector">
            <button class="model-btn active" data-model="openrouter/free" onclick="selectModel('openrouter/free')">🧠 Лучшая</button>
            <button class="model-btn premium" data-model="anthropic/claude-4.7-opus" onclick="selectModel('anthropic/claude-4.7-opus')">👑 Claude</button>
            <button class="model-btn premium" data-model="deepseek/deepseek-v4-flash" onclick="selectModel('deepseek/deepseek-v4-flash')">🚀 DeepSeek V4</button>
            <button class="model-btn premium" data-model="google/gemini-3-pro-image-preview" onclick="selectModel('google/gemini-3-pro-image-preview')">🍌 Nano Pro</button>
            <button class="model-btn premium" data-model="google/gemini-3.1-flash-image-preview" onclick="selectModel('google/gemini-3.1-flash-image-preview')">🍌🚀 Nano 2</button>
        </div>

        <!-- ЧАТ -->
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="msg bot">🍓 Выбери модель и задавай вопросы.</div>
            </div>
            <div class="input-area">
                <input type="text" id="chatInput" placeholder="Напиши сообщение..." onkeydown="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">📤</button>
            </div>
        </div>

        <!-- ДЕЙСТВИЯ -->
        <div class="actions">
            <button onclick="clearChat()" class="danger">🗑️ /clear</button>
            <button onclick="openClearAllModal()" class="warning">⚠️ /clearall</button>
            <button onclick="closeApp()">❌ Закрыть</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ============================================
        // КОНФИГ
        // ============================================
        const OPENROUTER_KEY = 'sk-or-v1-ТВОЙ_КЛЮЧ_СЮДА'; // 🔥 ЗАМЕНИ НА СВОЙ КЛЮЧ!
        let selectedModel = 'openrouter/free';
        let isProcessing = false;

        // ============================================
        // ТОСТ
        // ============================================
        function showToast(text, duration = 2000) {
            const toast = document.getElementById('toast');
            toast.textContent = text;
            toast.classList.add('show');
            clearTimeout(toast._hideTimer);
            toast._hideTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        // ============================================
        // МОДАЛЬНОЕ ОКНО
        // ============================================
        function openClearAllModal() {
            document.getElementById('clearallModal').classList.add('active');
        }
        function closeModal() {
            document.getElementById('clearallModal').classList.remove('active');
        }
        function confirmClearAll() {
            closeModal();
            localStorage.removeItem('chatHistory');
            // Отправляем команду боту
            tg.sendData(JSON.stringify({ action: 'clearall' }));
            showToast('🗑️ Вся история удалена!', 2000);
            const container = document.getElementById('chatMessages');
            container.innerHTML = `<div class="msg bot">🍓 Вся история удалена! Начинай заново.</div>`;
        }

        // ============================================
        // ВЫБОР МОДЕЛИ
        // ============================================
        function selectModel(modelId) {
            selectedModel = modelId;
            document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
            const btn = document.querySelector(`[data-model="${modelId}"]`);
            if (btn) btn.classList.add('active');
            showToast('🍓 Модель выбрана', 1000);
        }

        // ============================================
        // ЧАТ
        // ============================================
        function addMessage(text, isUser = false) {
            const container = document.getElementById('chatMessages');
            const msg = document.createElement('div');
            msg.className = `msg ${isUser ? 'user' : 'bot'}`;
            const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            msg.innerHTML = `${text}<span class="time">${time}</span>`;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;

            const history = JSON.parse(localStorage.getItem('chatHistory') || '[]');
            history.push({ text, isUser, time });
            localStorage.setItem('chatHistory', JSON.stringify(history));
        }

        function loadChatHistory() {
            const history = JSON.parse(localStorage.getItem('chatHistory') || '[]');
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';
            if (history.length === 0) {
                container.innerHTML = `<div class="msg bot">🍓 Выбери модель и задавай вопросы.</div>`;
                return;
            }
            history.forEach(msg => {
                const div = document.createElement('div');
                div.className = `msg ${msg.isUser ? 'user' : 'bot'}`;
                div.innerHTML = `${msg.text}<span class="time">${msg.time}</span>`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        function clearChat() {
            localStorage.setItem('chatHistory', '[]');
            const container = document.getElementById('chatMessages');
            container.innerHTML = `<div class="msg bot">🍓 История очищена. Задавай вопросы!</div>`;
            showToast('🗑️ Чат очищен', 1500);
            // Отправляем боту
            tg.sendData(JSON.stringify({ action: 'clear' }));
        }

        // ============================================
        // ОТПРАВКА СООБЩЕНИЯ (ИСПРАВЛЕННАЯ!)
        // ============================================
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || isProcessing) return;
            input.value = '';
            addMessage(text, true);
            isProcessing = true;

            const container = document.getElementById('chatMessages');
            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'msg bot';
            loadingMsg.id = 'loadingMsg';
            loadingMsg.innerHTML = `<span class="loading"></span> Думаю...`;
            container.appendChild(loadingMsg);
            container.scrollTop = container.scrollHeight;

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + OPENROUTER_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: selectedModel,
                        messages: [{ role: 'user', content: text }]
                    })
                });
                const data = await response.json();
                document.getElementById('loadingMsg')?.remove();
                if (data.error) {
                    addMessage('❌ ' + (data.error.message || 'Ошибка'), false);
                } else if (data.choices) {
                    addMessage(data.choices[0].message.content, false);
                } else {
                    addMessage('❌ Неожиданный ответ', false);
                }
            } catch (error) {
                document.getElementById('loadingMsg')?.remove();
                addMessage('❌ Ошибка: ' + error.message, false);
            }
            isProcessing = false;
        }

        function closeApp() {
            tg.close();
        }

        // ============================================
        // ЗАГРУЗКА
        // ============================================
        loadChatHistory();
        console.log('🍓 KryxMind AI v3.0 загружен!');
    </script>
</body>
</html>
