<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KryxMind AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0f0c29 0%, #1a1a3e 50%, #2d1b3d 100%);
            color: #fff;
            min-height: 100vh;
            padding: 16px;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(255, 107, 107, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(107, 203, 119, 0.06) 0%, transparent 60%);
            z-index: 0;
            animation: backgroundFloat 25s ease-in-out infinite alternate;
        }
        @keyframes backgroundFloat {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }
            100% {
                transform: translate(-2%, -2%) rotate(3deg);
            }
        }
        .container {
            max-width: 420px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-left .logo {
            font-size: 32px;
            animation: pulse 2.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }
        .header-left h1 {
            font-size: 22px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b6b 0%, #ffd93d 40%, #6bcb77 70%, #4dabf7 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 4s ease-in-out infinite alternate;
            letter-spacing: -0.5px;
        }
        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 100% 50%;
            }
        }
        .user-info {
            text-align: right;
            font-size: 12px;
            line-height: 1.4;
        }
        .user-info .name {
            color: #fff;
            font-weight: 600;
            font-size: 13px;
        }
        .user-info .status {
            font-size: 10px;
            padding: 2px 12px;
            border-radius: 20px;
            display: inline-block;
            font-weight: 600;
            margin-top: 2px;
        }
        .status-premium {
            background: rgba(107, 203, 119, 0.2);
            color: #6bcb77;
            border: 1px solid rgba(107, 203, 119, 0.2);
        }
        .status-free {
            background: rgba(255, 107, 107, 0.15);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.15);
        }
        .status-loading {
            background: rgba(255, 217, 61, 0.15);
            color: #ffd93d;
            border: 1px solid rgba(255, 217, 61, 0.15);
        }

        .model-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 14px 0 16px;
            padding: 4px 0;
        }
        .model-btn {
            padding: 8px 14px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            flex: 1 0 auto;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: center;
        }
        .model-btn:active {
            transform: scale(0.94);
        }
        .model-btn.active {
            border-color: #6bcb77;
            background: rgba(107, 203, 119, 0.12);
            color: #fff;
            box-shadow: 0 0 30px rgba(107, 203, 119, 0.05);
        }
        .model-btn.premium {
            border-color: rgba(255, 217, 61, 0.15);
        }
        .model-btn.premium.active {
            border-color: #ffd93d;
            background: rgba(255, 217, 61, 0.10);
            box-shadow: 0 0 30px rgba(255, 217, 61, 0.05);
        }
        .model-btn.premium.locked {
            opacity: 0.35;
            cursor: not-allowed;
            border-color: rgba(255, 107, 107, 0.1);
        }
        .model-btn .badge {
            font-size: 8px;
            padding: 1px 8px;
            border-radius: 12px;
            margin-left: 2px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .badge.free {
            background: rgba(107, 203, 119, 0.15);
            color: #6bcb77;
        }
        .badge.premium-badge {
            background: rgba(255, 217, 61, 0.15);
            color: #ffd93d;
        }

        .chat-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px;
            height: 55vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 4px 4px 8px;
            margin-bottom: 8px;
            scroll-behavior: smooth;
        }
        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .msg {
            padding: 10px 16px;
            margin: 4px 0 6px;
            border-radius: 16px;
            max-width: 88%;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .msg.user {
            background: rgba(255, 107, 107, 0.15);
            margin-left: auto;
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(255, 107, 107, 0.08);
        }
        .msg.bot {
            background: rgba(77, 171, 247, 0.08);
            margin-right: auto;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(77, 171, 247, 0.05);
        }
        .msg .time {
            font-size: 9px;
            opacity: 0.25;
            display: block;
            margin-top: 4px;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .input-area {
            display: flex;
            gap: 10px;
            align-items: center;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }
        .input-area input:focus {
            border-color: rgba(107, 203, 119, 0.3);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 20px rgba(107, 203, 119, 0.03);
        }
        .input-area input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }
        .input-area input:disabled {
            opacity: 0.3;
        }
        .input-area button {
            padding: 12px 20px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #ff6b6b, #ff8a5c);
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(255, 107, 107, 0.15);
            min-width: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .input-area button:active {
            transform: scale(0.92);
        }
        .input-area button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .actions button {
            flex: 1;
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            min-width: 60px;
        }
        .actions button:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.05);
        }
        .actions button.danger {
            color: #ff6b6b;
            border-color: rgba(255, 107, 107, 0.1);
        }
        .actions button.danger:active {
            background: rgba(255, 107, 107, 0.08);
        }
        .actions button.primary {
            background: linear-gradient(135deg, #ff6b6b, #ff8a5c);
            color: #fff;
            border: none;
            box-shadow: 0 4px 20px rgba(255, 107, 107, 0.1);
        }
        .actions button.primary:active {
            transform: scale(0.95);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(12px);
            animation: modalFade 0.3s ease;
        }
        @keyframes modalFade {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: linear-gradient(145deg, #1a1a3e, #2d1b3d);
            padding: 28px 24px;
            border-radius: 24px;
            max-width: 340px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
            animation: modalSlide 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalSlide {
            from {
                transform: translateY(30px) scale(0.95);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }
        .modal-content h3 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 18px;
            background: linear-gradient(135deg, #ffd93d, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .modal-content .plan {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            margin: 6px 0;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .modal-content .plan:active {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.06);
        }
        .modal-content .plan .plan-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .modal-content .plan .plan-info .plan-name {
            font-weight: 600;
            font-size: 14px;
        }
        .modal-content .plan .plan-info .plan-days {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
        }
        .modal-content .plan .price {
            color: #ffd93d;
            font-weight: 700;
            font-size: 18px;
        }
        .modal-content .close-btn {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            border-radius: 14px;
            border: none;
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.3);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .modal-content .close-btn:active {
            background: rgba(255, 255, 255, 0.08);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(24px);
            padding: 12px 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 100;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.success {
            border-color: rgba(107, 203, 119, 0.2);
        }
        .toast.error {
            border-color: rgba(255, 107, 107, 0.2);
        }

        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 420px) {
            .container {
                padding: 0 4px;
            }
            .header-left h1 {
                font-size: 18px;
            }
            .model-btn {
                font-size: 10px;
                padding: 6px 10px;
            }
            .msg {
                font-size: 13px;
                padding: 8px 12px;
            }
            .modal-content {
                padding: 20px 16px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="toast" id="toast"></div>

        <!-- Модалка подписки -->
        <div class="modal" id="subscriptionModal">
            <div class="modal-content">
                <h3>💎 Премиум</h3>
                <div class="plan" onclick="buyPlan(7, 150)">
                    <div class="plan-info">
                        <span class="plan-name">🚀 Старт</span>
                        <span class="plan-days">7 дней</span>
                    </div>
                    <span class="price">150 ₽</span>
                </div>
                <div class="plan" onclick="buyPlan(30, 500)">
                    <div class="plan-info">
                        <span class="plan-name">🔥 Оптимальный</span>
                        <span class="plan-days">30 дней</span>
                    </div>
                    <span class="price">500 ₽</span>
                </div>
                <div class="plan" onclick="buyPlan(90, 1200)">
                    <div class="plan-info">
                        <span class="plan-name">💎 Максимум</span>
                        <span class="plan-days">90 дней</span>
                    </div>
                    <span class="price">1200 ₽</span>
                </div>
                <button class="close-btn" onclick="closeSubscriptionModal()">❌ Закрыть</button>
            </div>
        </div>

        <!-- Шапка -->
        <div class="header">
            <div class="header-left">
                <span class="logo">🍓</span>
                <h1>KryxMind</h1>
            </div>
            <div class="user-info">
                <div class="name" id="userName">👤 Загрузка...</div>
                <span class="status status-loading" id="userStatus">⏳ Загрузка</span>
            </div>
        </div>

        <!-- Модели -->
        <div class="model-selector" id="modelSelector">
            <button class="model-btn active" data-model="openrouter/free" data-premium="false" onclick="selectModel('openrouter/free')">
                🧠 Лучшая <span class="badge free">FREE</span>
            </button>
            <button class="model-btn premium locked" data-model="anthropic/claude-4.7-opus" data-premium="true" onclick="selectModel('anthropic/claude-4.7-opus')">
                👑 Claude <span class="badge premium-badge">⭐</span>
            </button>
            <button class="model-btn premium locked" data-model="deepseek/deepseek-v4-flash" data-premium="true" onclick="selectModel('deepseek/deepseek-v4-flash')">
                🚀 DeepSeek <span class="badge premium-badge">⭐</span>
            </button>
            <button class="model-btn premium locked" data-model="google/gemini-3-pro-image-preview" data-premium="true" onclick="selectModel('google/gemini-3-pro-image-preview')">
                🍌 Nano Pro <span class="badge premium-badge">⭐</span>
            </button>
            <button class="model-btn premium locked" data-model="google/gemini-3.1-flash-image-preview" data-premium="true" onclick="selectModel('google/gemini-3.1-flash-image-preview')">
                🍌🚀 Nano 2 <span class="badge premium-badge">⭐</span>
            </button>
        </div>

        <!-- Чат -->
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="msg bot">🍓 Выбери модель и задавай вопросы.</div>
            </div>
            <div class="input-area">
                <input type="text" id="chatInput" placeholder="Ожидание ключа..." onkeydown="if(event.key==='Enter') sendMessage()" disabled>
                <button onclick="sendMessage()" id="sendBtn" disabled>📤</button>
            </div>
        </div>

        <!-- Действия -->
        <div class="actions">
            <button onclick="clearChat()" class="danger">🗑️ Очистить</button>
            <button onclick="openSubscriptionModal()" class="primary">💎 Купить подписку</button>
            <button onclick="closeApp()">❌ Закрыть</button>
        </div>
    </div>

    <script>
        // ============================================
        // 1. Telegram WebApp
        // ============================================
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe?.user || { id: 0, username: 'Guest', first_name: 'Гость' };
        document.getElementById('userName').textContent = '👤 ' + (user.first_name || user.username || 'Гость');

        // ============================================
        // 2. ПОЛУЧАЕМ КЛЮЧ ОТ БОТА (БЕЗОПАСНО!)
        // ============================================
        let OPENROUTER_KEY = null;
        let hasPremium = false;
        let selectedModel = 'openrouter/free';
        let isProcessing = false;
        let isConfigLoaded = false;

        function loadConfigFromBot() {
            console.log('📤 Запрос конфига у бота...');
            tg.sendData(JSON.stringify({
                action: 'get_config'
            }));

            setTimeout(() => {
                if (!isConfigLoaded) {
                    showToast('⏳ Бот не отвечает! Проверь, запущен ли бот.', 4000);
                }
            }, 5000);
        }

        // Обработка ответа от бота
        if (typeof tg.onEvent === 'function') {
            tg.onEvent('web_app_data', function(data) {
                try {
                    console.log('📥 Получены данные от бота:', data);
                    const config = JSON.parse(data);
                    handleConfig(config);
                } catch (e) {
                    console.error('❌ Ошибка парсинга:', e);
                    showToast('❌ Ошибка получения ключа', 2000);
                }
            });
        }

        function handleConfig(config) {
            OPENROUTER_KEY = config.openrouter_key;
            isConfigLoaded = true;

            if (OPENROUTER_KEY) {
                console.log('✅ Ключ получен от бота!');
                showToast('✅ Приложение готово к работе!', 1500);
                document.getElementById('chatInput').disabled = false;
                document.getElementById('chatInput').placeholder = 'Напиши сообщение...';
                document.getElementById('sendBtn').disabled = false;
            } else {
                console.error('❌ Ключ не получен!');
                showToast('❌ Ключ не получен от бота!', 3000);
            }
        }

        // ============================================
        // 3. ПОДПИСКА
        // ============================================
        function loadSubscription() {
            const data = localStorage.getItem('kryxmind_subscription');
            if (data) {
                try {
                    const parsed = JSON.parse(data);
                    if (parsed.expires && new Date(parsed.expires) > new Date()) {
                        hasPremium = true;
                        return true;
                    } else {
                        localStorage.removeItem('kryxmind_subscription');
                    }
                } catch (e) {}
            }
            hasPremium = false;
            return false;
        }

        function saveSubscription(days) {
            const expires = new Date();
            expires.setDate(expires.getDate() + days);
            localStorage.setItem('kryxmind_subscription', JSON.stringify({ expires: expires.toISOString() }));
            hasPremium = true;
            updateUI();
            showToast('✅ Подписка активирована на ' + days + ' дней!', 2000);
            tg.sendData(JSON.stringify({
                action: 'buy_subscription',
                days: days
            }));
        }

        function updateUI() {
            const statusEl = document.getElementById('userStatus');
            if (hasPremium) {
                statusEl.textContent = '🟢 Премиум';
                statusEl.className = 'status status-premium';
                document.querySelectorAll('.model-btn.premium').forEach(btn => {
                    btn.classList.remove('locked');
                    btn.style.opacity = '1';
                    btn.style.cursor = 'pointer';
                });
            } else {
                statusEl.textContent = '🔴 Бесплатный';
                statusEl.className = 'status status-free';
                document.querySelectorAll('.model-btn.premium').forEach(btn => {
                    btn.classList.add('locked');
                    btn.style.opacity = '0.35';
                    btn.style.cursor = 'not-allowed';
                });
                const active = document.querySelector('.model-btn.active');
                if (active && active.dataset.premium === 'true') {
                    selectModel('openrouter/free');
                }
            }
        }

        // ============================================
        // 4. МОДАЛКА
        // ============================================
        function openSubscriptionModal() {
            document.getElementById('subscriptionModal').classList.add('active');
        }

        function closeSubscriptionModal() {
            document.getElementById('subscriptionModal').classList.remove('active');
        }

        function buyPlan(days, price) {
            showToast('💎 Оплата ' + days + ' дней за ' + price + ' ₽', 1500);
            saveSubscription(days);
            closeSubscriptionModal();
        }

        // ============================================
        // 5. ТОСТ
        // ============================================
        function showToast(text, duration = 2000) {
            const toast = document.getElementById('toast');
            toast.textContent = text;
            toast.className = 'toast';
            toast.classList.add('show');
            clearTimeout(toast._hideTimer);
            toast._hideTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        // ============================================
        // 6. МОДЕЛИ
        // ============================================
        function selectModel(modelId) {
            const btn = document.querySelector(`[data-model="${modelId}"]`);
            if (!btn) return;
            if (btn.dataset.premium === 'true' && !hasPremium) {
                showToast('⛔ Это премиум-модель! Купи подписку.', 2000);
                openSubscriptionModal();
                return;
            }
            selectedModel = modelId;
            document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            showToast('🍓 Модель выбрана', 800);
        }

        // ============================================
        // 7. ЧАТ
        // ============================================
        function addMessage(text, isUser = false) {
            const container = document.getElementById('chatMessages');
            const msg = document.createElement('div');
            msg.className = `msg ${isUser ? 'user' : 'bot'}`;
            const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            msg.innerHTML = text + `<span class="time">${time}</span>`;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;

            const history = JSON.parse(localStorage.getItem('chatHistory') || '[]');
            history.push({ text, isUser, time });
            localStorage.setItem('chatHistory', JSON.stringify(history));
        }

        function loadChatHistory() {
            const history = JSON.parse(localStorage.getItem('chatHistory') || '[]');
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';
            if (history.length === 0) {
                container.innerHTML = `<div class="msg bot">🍓 Выбери модель и задавай вопросы.</div>`;
                return;
            }
            history.forEach(msg => {
                const div = document.createElement('div');
                div.className = `msg ${msg.isUser ? 'user' : 'bot'}`;
                div.innerHTML = msg.text + `<span class="time">${msg.time}</span>`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        function clearChat() {
            localStorage.setItem('chatHistory', '[]');
            const container = document.getElementById('chatMessages');
            container.innerHTML = `<div class="msg bot">🍓 История очищена. Задавай вопросы!</div>`;
            showToast('🗑️ Чат очищен', 1500);
            tg.sendData(JSON.stringify({ action: 'clear' }));
        }

        // ============================================
        // 8. ОТПРАВКА СООБЩЕНИЯ
        // ============================================
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || isProcessing) return;

            if (!OPENROUTER_KEY) {
                showToast('⛔ Ключ не получен! Перезапусти приложение.', 3000);
                return;
            }

            const activeBtn = document.querySelector('.model-btn.active');
            if (activeBtn && activeBtn.dataset.premium === 'true' && !hasPremium) {
                showToast('⛔ Это премиум-модель! Купи подписку.', 2000);
                openSubscriptionModal();
                return;
            }

            input.value = '';
            addMessage(text, true);
            isProcessing = true;

            const container = document.getElementById('chatMessages');
            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'msg bot';
            loadingMsg.id = 'loadingMsg';
            loadingMsg.innerHTML = `<span class="loading"></span> Думаю...`;
            container.appendChild(loadingMsg);
            container.scrollTop = container.scrollHeight;

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + OPENROUTER_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: selectedModel,
                        messages: [{ role: 'user', content: text }]
                    })
                });
                const data = await response.json();
                document.getElementById('loadingMsg')?.remove();
                if (data.error) {
                    addMessage('❌ ' + (data.error.message || 'Ошибка'), false);
                } else if (data.choices) {
                    addMessage(data.choices[0].message.content, false);
                } else {
                    addMessage('❌ Неожиданный ответ', false);
                }
            } catch (error) {
                document.getElementById('loadingMsg')?.remove();
                addMessage('❌ Ошибка: ' + error.message, false);
            }
            isProcessing = false;
        }

        function closeApp() {
            tg.close();
        }

        // ============================================
        // 9. ЗАГРУЗКА
        // ============================================
        loadSubscription();
        loadChatHistory();
        updateUI();

        setTimeout(() => {
            loadConfigFromBot();
        }, 500);

        console.log('🍓 KryxMind AI загружен! Ожидаем ключ от бота...');
    </script>
</body>
</html>
